header:
    title: ""
    text: Need a home loan?

services:
    title: "Services We Offer"
    text: "We get you the most competitive rate by sourcing quotes from the banks for you to compare."
    section: services
    list:
      - title: "Bond Origination"
        desc: "We submit your application to up to seven banks to get you the best rate, at no cost to you."
        icon: fas fa-home
        link: 
          url: mailto:lizzy.mootane@evogroup.co.za?subject=Mail from evo Ultimate website
          text: "Email Us"
      - title: "Pre-qualification"
        desc: "One of our experts will help check your credit record, income and expenses to give you an accurate assessment of what you can afford. We let you know how likely you are to qualify for a bond."
        icon: fas fa-tasks       
        link:
          url: tel:+27125424388 
          text: "Call: 012 542 4388"
      - title: "I’m Still Looking for a Home"
        desc: "I’m searching property portals and visiting show houses."
        icon: fas fa-search

calculators:
    title: "Home Loan Calculators"
    text: "Use our Home loan Calculators to work out the size of home loan you are likely to qualify for and what your bond repayments will be."
    section: calculators
    list:
      - title: "Bond Calculator"
        desc: "Calculate the home loan you qualify for."
        icon: fas fa-calculator
        link: 
          url: /affordability-calculator
          text: "Calculate"
      - title: "Repayment Calculator"
        desc: "Calculate your monthly bond repayments."
        icon: fas fa-calculator   
        link:
          url: /bond-calculator
          text: "Calculate"


textblock:
    title: "Why evo Ultimate"
    text: "Home loans are our business, and we focus on getting bonds approved."
    footer: "Our service is completely FREE, with no obligation."
    section: textblock
    list:
      - title: "We assist you in completing your home loan application."
        image: "fa-university"
      - title: "We apply to seven leading banks and collect their quotes."
        image: "fa-file-invoice-dollar"
      - title: "You then compare the various quotes."
        image: "fa-balance-scale"
      - title: "We negotiate the rate and terms of the home loan on your behalf."
        image: "fa-comments-dollar"
      - title: "We can assist you in securing a zero deposit bond if required."
        image: "fa-user-shield"

portfolio:
    title: "Other Services"
    text: "Some of our work"
    section: portfolio
    closebutton: "Close"
    
about:
    title: "About Us"
    text2: "Evo Ultimate is a bond origination company that originates via all the major banks. We are specialists in the Pretoria area with a team of experienced professionals with 15 years of experience in homeloans and bond origination.

    <br><br> 
    
    Evo Ultimate is dedicated to excellence with a client focussed perspective. We seek to get the best interest rates in the shortest amount of time. 
    
    <br><br>
    
    We are proud to be associated with Evo, who is a part of the ooba Group."
    
