<!-- Contact -->
  <section class="page-section" id="{{ site.data.sitetext.contact.section | default: "contact" }}">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 text-center">
          <h2 class="section-heading text-uppercase" id="contact-title">{{ site.data.sitetext.contact.title | markdownify | default: Contact Us }}</h2>
          <h3 class="section-subheading text-muted">{{ site.data.sitetext.contact.text | default: "" }}</h3>

        </div>
      </div>
      <div class="row">
        <div class="col-lg-12">
          <form id="contactForm" action="https://formspree.io/{{ site.email }}" method="POST" novalidate aria-labelledby="contact-title">
             <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label class="sr-only" for="name">Name</label>
                  <input name="name" class="form-control" id="name" type="text" placeholder="Name" required data-validation-required-message="Please enter your name." aria-describedby="name-error">
                  <p class="help-block text-danger" id="name-error" role="alert"></p>
                </div>
                <div class="form-group">
                  <label class="sr-only" for="email">Email</label>
                  <input name="_replyto" class="form-control" id="email" type="email" placeholder="Email address" required data-validation-required-message="Please enter your email address." aria-describedby="email-error">
                  <p class="help-block text-danger" id="email-error" role="alert"></p>
                </div>
                <div class="form-group">
                  <label class="sr-only" for="phone">Phone Number</label>
                  <input name="phone" class="form-control" id="phone" type="tel" placeholder="Phone number" required data-validation-required-message="Please enter your phone number." aria-describedby="phone-error">
                  <p class="help-block text-danger" id="phone-error" role="alert"></p>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label class="sr-only" for="message">Message</label>
                  <textarea name="message" class="form-control" id="message" placeholder="How can we help?" required data-validation-required-message="Please enter a message." aria-describedby="message-error"></textarea>
                  <p class="help-block text-danger" id="message-error" role="alert"></p>
                </div>
              </div>
              <input type="hidden" name="_subject" id="email-subject" value="Contact Form Submission">
              <div class="clearfix"></div>
              <div class="col-lg-12 text-center">
                <div id="success" role="status" aria-live="polite"></div>
                <button id="sendMessageButton" class="btn btn-primary btn-xl text-uppercase" type="submit">Send message</button>
              </div>
              <input type="text" name="_gotcha" style="display:none" aria-hidden="true">
              <input type="hidden" name="_next" value="#">
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
<!-- End Contact -->
