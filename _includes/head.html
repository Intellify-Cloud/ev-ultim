<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#008fa8">

  {% if site.analytics.google %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
	gtag('config', '{{ site.analytics.google }}');
  </script>
  <!-- End Google Analytics -->
  {% endif %}

  <!-- SEO Meta Tags via jekyll-seo-tag -->
  {% seo %}

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#008fa8">
  
  <!-- Fonts with display swap for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/bundle.css' | relative_url }}">

  <!-- Scripts -->
  <script defer src="{{ '/assets/bundle.js' | relative_url }}"></script>
  <script lang="js">var baseurl = "{{ '' | relative_url }}";</script>

  <!-- Page container padding when nav is visible -->
  {% if page.layout == "page" %}
  <style>
    #pagecontainer {padding-top: 150px;}
    @media only screen and (max-width: 991px) {
      #pagecontainer {padding-top: 100px;}
    }
  </style>
  {% endif %}

  <!-- Structured data: FinancialService -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FinancialService",
    "name": "{{ site.title | escape }}",
    "url": "{{ site.url }}",
    "image": "{{ '/assets/evo-ultimate.png' | absolute_url }}",
    "email": "{{ site.email }}",
    "telephone": "+27 12 542 4388",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Honey Suckle Street",
      "addressLocality": "Montana, Pretoria",
      "postalCode": "0182",
      "addressCountry": "ZA"
    },
    "description": "{{ site.description | strip_html | normalize_whitespace | escape }}"
  }
  </script>
  
  <!-- Breadcrumb Structured Data (if page has parent) -->
  {% if page.breadcrumb %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}"
      }
      {% if page.breadcrumb %}
      ,{
        "@type": "ListItem",
        "position": 2,
        "name": "{{ page.title }}",
        "item": "{{ page.url | absolute_url }}"
      }
      {% endif %}
    ]
  }
  </script>
  {% endif %}
  
</head>
